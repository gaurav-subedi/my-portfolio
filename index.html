<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/wlogo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- No-flash theme: set .dark before first paint (no layout shift). -->
    <script>
      (function () {
        try {
          var dark =
            localStorage.theme === "dark" ||
            (!("theme" in localStorage) &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>

    <!-- Fonts: Geist (display/body) + JetBrains Mono (labels) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <title>Gaurav Subedi — Software Engineer</title>
    <meta
      name="description"
      content="CS student at UT Arlington and software engineering intern at Oak Hill Advisors. I build real-time systems and full-stack tools with FastAPI, React, TypeScript, and AWS."
    />

    <!-- Open Graph -->
    <meta property="og:title" content="Gaurav Subedi — Software Engineer" />
    <meta
      property="og:description"
      content="CS student at UT Arlington and software engineering intern at Oak Hill Advisors. I build real-time systems and full-stack tools with FastAPI, React, TypeScript, and AWS."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gauravsubedi123.com.np/" />
    <meta property="og:image" content="https://gauravsubedi123.com.np/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gaurav Subedi — Software Engineer" />
    <meta
      name="twitter:description"
      content="CS student at UT Arlington and software engineering intern at Oak Hill Advisors. I build real-time systems and full-stack tools with FastAPI, React, TypeScript, and AWS."
    />
    <meta name="twitter:image" content="https://gauravsubedi123.com.np/og-image.png" />

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ENKJCV1K2K"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-ENKJCV1K2K');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
